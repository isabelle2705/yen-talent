<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yen Talent — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --black:#080808;--white:#f5f0ea;--gold:#c9a84c;--gold-light:#e8c97a;--gray:#1a1a1a;--gray-mid:#555;--gray-light:#999;--red:#c0392b;--green:#27ae60; }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0f0f0f;color:var(--white);font-family:'Outfit',sans-serif;font-weight:300;min-height:100vh;}

    #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0a0a,#111);}
    .login-box{background:#141414;border:1px solid rgba(201,168,76,0.2);padding:48px;width:360px;text-align:center;}
    .login-logo{font-size:1.4rem;letter-spacing:0.2em;font-weight:400;margin-bottom:8px;}
    .login-logo span{color:var(--gold);}
    .login-sub{font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gray-mid);margin-bottom:36px;}
    .login-input{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);color:var(--white);padding:14px 18px;font-family:'Outfit',sans-serif;font-size:0.9rem;outline:none;margin-bottom:12px;}
    .login-input:focus{border-color:var(--gold);}
    .login-btn{width:100%;background:var(--gold);color:var(--black);border:none;padding:14px;font-family:'Outfit',sans-serif;font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;font-weight:500;cursor:pointer;margin-bottom:12px;}
    .login-btn:hover{background:var(--gold-light);}
    .login-error{font-size:0.78rem;color:var(--red);margin-top:8px;display:none;}

    #adminPanel{display:none;}
    .admin-header{background:#111;border-bottom:1px solid rgba(201,168,76,0.15);padding:20px 40px;display:flex;align-items:center;justify-content:space-between;}
    .admin-logo{font-size:1.1rem;letter-spacing:0.2em;font-weight:400;}
    .admin-logo span{color:var(--gold);}
    .admin-logout{background:none;border:1px solid rgba(255,255,255,0.1);color:var(--gray-light);padding:8px 20px;font-family:'Outfit',sans-serif;font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;}
    .admin-logout:hover{border-color:var(--red);color:var(--red);}
    .admin-body{padding:40px;max-width:1100px;margin:0 auto;}

    #configBanner{background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.3);padding:20px 24px;margin-bottom:32px;}
    .config-title{font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;}
    .config-inputs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
    .config-input{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.08);color:var(--white);padding:10px 14px;font-family:'Outfit',sans-serif;font-size:0.82rem;outline:none;width:100%;}
    .config-input:focus{border-color:var(--gold);}
    .config-save{background:var(--gold);color:var(--black);border:none;padding:10px 24px;font-family:'Outfit',sans-serif;font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;}
    .config-note{font-size:0.75rem;color:var(--gray-mid);margin-top:8px;}
    .status-bar{background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15);padding:12px 20px;margin-bottom:28px;font-size:0.78rem;color:var(--gray-light);display:flex;align-items:center;gap:10px;}
    .status-dot{width:8px;height:8px;border-radius:50%;background:var(--gray-mid);flex-shrink:0;}
    .status-dot.connected{background:var(--green);}

    .section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
    .section-title{font-size:1.2rem;font-weight:400;}
    .btn-add{background:var(--gold);color:var(--black);border:none;padding:12px 28px;font-family:'Outfit',sans-serif;font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;font-weight:500;cursor:pointer;}
    .btn-add:hover{background:var(--gold-light);}

    .talent-table{width:100%;border-collapse:collapse;}
    .talent-table th{font-size:0.62rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--gray-mid);padding:12px 16px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.06);}
    .talent-table td{padding:16px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.85rem;color:var(--gray-light);vertical-align:middle;}
    .talent-table tr:hover td{background:rgba(255,255,255,0.02);}
    .talent-photo-thumb{width:48px;height:64px;background:var(--gray);display:flex;align-items:center;justify-content:center;color:var(--gray-mid);font-size:0.6rem;}
    .talent-photo-thumb img{width:100%;height:100%;object-fit:cover;}
    .talent-name-cell{color:var(--white);font-weight:400;}
    .talent-cn{font-size:0.75rem;color:var(--gold);}
    .badge{display:inline-block;padding:3px 10px;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;}
    .badge-active{background:rgba(39,174,96,0.15);color:#2ecc71;border:1px solid rgba(39,174,96,0.3);}
    .badge-hidden{background:rgba(255,255,255,0.05);color:var(--gray-mid);border:1px solid rgba(255,255,255,0.1);}
    .btn-edit{background:none;border:1px solid rgba(201,168,76,0.3);color:var(--gold);padding:6px 14px;font-family:'Outfit',sans-serif;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;margin-right:6px;}
    .btn-edit:hover{background:rgba(201,168,76,0.1);}
    .btn-delete{background:none;border:1px solid rgba(192,57,43,0.3);color:var(--red);padding:6px 14px;font-family:'Outfit',sans-serif;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;}
    .btn-delete:hover{background:rgba(192,57,43,0.1);}
    .empty-state{text-align:center;padding:60px;color:var(--gray-mid);}

    /* INLINE FORM - no fixed positioning, no modal, no overlay */
    #talentForm{display:none;background:#141414;border:1px solid rgba(201,168,76,0.2);padding:40px;margin-top:32px;}
    #talentForm.active{display:block;}
    .form-title{font-size:1.3rem;font-weight:400;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.06);}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
    .form-group{display:flex;flex-direction:column;gap:8px;}
    .form-group.full{grid-column:span 2;}
    .form-label{font-size:0.62rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--gray-mid);}
    .form-input,.form-select{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);color:var(--white);padding:12px 16px;font-family:'Outfit',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.3s;width:100%;}
    .form-input:focus,.form-select:focus{border-color:var(--gold);}
    .form-select{appearance:none;cursor:pointer;}

    .photo-section{border:1px dashed rgba(201,168,76,0.3);padding:20px;text-align:center;}
    #photoPreview{width:80px;height:100px;object-fit:cover;margin:0 auto 12px;display:none;}
    .photo-hint{font-size:0.75rem;color:var(--gray-mid);margin-bottom:10px;}
    #photoFile{font-family:'Outfit',sans-serif;font-size:0.82rem;color:var(--gold-light);cursor:pointer;display:block;margin:0 auto;}

    .form-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:28px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.06);}
    .btn-cancel{background:none;border:1px solid rgba(255,255,255,0.1);color:var(--gray-light);padding:12px 28px;font-family:'Outfit',sans-serif;font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;}
    .btn-cancel:hover{border-color:rgba(255,255,255,0.3);}
    .btn-save{background:var(--gold);color:var(--black);border:none;padding:12px 32px;font-family:'Outfit',sans-serif;font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;font-weight:500;cursor:pointer;}
    .btn-save:hover{background:var(--gold-light);}

    .toast{position:fixed;bottom:32px;right:32px;z-index:9999;background:#1a1a1a;border:1px solid rgba(201,168,76,0.3);padding:14px 24px;font-size:0.82rem;opacity:0;transform:translateY(10px);transition:all 0.3s;pointer-events:none;}
    .toast.show{opacity:1;transform:translateY(0);}
    .toast.success{border-color:rgba(39,174,96,0.4);color:#2ecc71;}
    .toast.error{border-color:rgba(192,57,43,0.4);color:var(--red);}
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">YEN <span>TALENT</span></div>
    <div class="login-sub">Admin Panel</div>
    <input class="login-input" type="password" id="passwordInput" placeholder="Enter password" onkeydown="if(event.key==='Enter') login()"/>
    <button class="login-btn" onclick="login()">Sign In</button>
    <div class="login-error" id="loginError">Incorrect password. Try again.</div>
  </div>
</div>

<div id="adminPanel">
  <div class="admin-header">
    <div class="admin-logo">YEN <span>TALENT</span> <span style="color:var(--gray-mid);font-size:0.7rem;letter-spacing:0.2em;margin-left:12px;">ADMIN</span></div>
    <button class="admin-logout" onclick="logout()">Sign Out</button>
  </div>
  <div class="admin-body">

    <div id="configBanner">
      <div class="config-title">Supabase Connection</div>
      <div class="config-inputs">
        <input class="config-input" id="supabaseUrl" placeholder="Supabase Project URL"/>
        <input class="config-input" id="supabaseKey" placeholder="Supabase Anon Key"/>
      </div>
      <button class="config-save" onclick="saveConfig()">Save & Connect</button>
      <div class="config-note">Settings → API in your Supabase project. Saved in your browser.</div>
    </div>

    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Not connected. Enter credentials above.</span>
    </div>

    <div class="section-head">
      <div class="section-title">Talents</div>
      <button class="btn-add" onclick="openForm()">+ Add Talent</button>
    </div>

    <table class="talent-table">
      <thead>
        <tr><th>Photo</th><th>Name</th><th>Based In</th><th>Languages</th><th>Skills</th><th>Status</th><th>Actions</th></tr>
      </thead>
      <tbody id="talentBody">
        <tr><td colspan="7"><div class="empty-state">No talents yet.</div></td></tr>
      </tbody>
    </table>

    <!-- FORM IS INLINE ON THE PAGE — no modal, no fixed overlay -->
    <div id="talentForm">
      <div class="form-title" id="formTitle">Add Talent</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Name (English)</label>
          <input class="form-input" id="nameEn" placeholder="e.g. Mei Lin Chen"/>
        </div>
        <div class="form-group">
          <label class="form-label">Name (Chinese)</label>
          <input class="form-input" id="nameZh" placeholder="e.g. 陈美琳"/>
        </div>
        <div class="form-group">
          <label class="form-label">Role (English)</label>
          <input class="form-input" id="roleEn" placeholder="e.g. Lead Actress — Film & TV"/>
        </div>
        <div class="form-group">
          <label class="form-label">Role (Chinese)</label>
          <input class="form-input" id="roleZh" placeholder="e.g. 女主角 — 电影与电视"/>
        </div>
        <div class="form-group">
          <label class="form-label">Based In</label>
          <input class="form-input" id="basedIn" placeholder="e.g. Auckland / Singapore"/>
        </div>
        <div class="form-group">
          <label class="form-label">Languages</label>
          <input class="form-input" id="languages" placeholder="e.g. English, Mandarin"/>
        </div>
        <div class="form-group full">
          <label class="form-label">Skills</label>
          <input class="form-input" id="skills" placeholder="e.g. Drama, Action, Dance"/>
        </div>
        <div class="form-group full">
          <label class="form-label">Photo</label>
          <div class="photo-section">
            <img id="photoPreview" alt="preview"/>
            <p class="photo-hint">JPG or PNG recommended</p>
            <input type="file" id="photoFile" accept="image/jpeg,image/png,image/jpg,image/webp" onchange="previewPhoto(event)"/>
          </div>
          <input type="hidden" id="photoUrl"/>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="talentStatus">
            <option value="active">Active (visible on site)</option>
            <option value="hidden">Hidden</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Featured</label>
          <select class="form-select" id="talentFeatured">
            <option value="false">No</option>
            <option value="true">Yes — show Featured badge</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeForm()">Cancel</button>
        <button class="btn-save" onclick="saveTalent()">Save Talent</button>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const ADMIN_PASSWORD = 'yentalent2026';
  let supabaseUrl = localStorage.getItem('yt_supabase_url') || 'https://pjtddseixuzdodgoonko.supabase.co';
  let supabaseKey = localStorage.getItem('yt_supabase_key') || 'sb_publishable_4QajGBzRWkFGE_q7IVp1gQ_WhxlK8YY';
  let talents = [];
  let editingId = null;

  function login() {
    if (document.getElementById('passwordInput').value === ADMIN_PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      loadConfig();
      fetchTalents();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  function logout() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('passwordInput').value = '';
  }

  function loadConfig() {
    document.getElementById('supabaseUrl').value = supabaseUrl;
    document.getElementById('supabaseKey').value = supabaseKey;
    if (supabaseUrl && supabaseKey) updateStatus(true);
  }

  function saveConfig() {
    supabaseUrl = document.getElementById('supabaseUrl').value.trim().replace(/\/$/, '');
    supabaseKey = document.getElementById('supabaseKey').value.trim();
    localStorage.setItem('yt_supabase_url', supabaseUrl);
    localStorage.setItem('yt_supabase_key', supabaseKey);
    fetchTalents();
  }

  function updateStatus(ok, msg) {
    document.getElementById('statusDot').className = 'status-dot' + (ok ? ' connected' : '');
    document.getElementById('statusText').textContent = msg || (ok ? 'Connected ✓' : 'Not connected.');
  }

  async function sbFetch(path, opts = {}) {
    const res = await fetch(`${supabaseUrl}/rest/v1/${path}`, {
      ...opts,
      headers: { 'apikey': supabaseKey, 'Authorization': `Bearer ${supabaseKey}`, 'Content-Type': 'application/json', 'Prefer': opts.prefer || 'return=representation', ...opts.headers }
    });
    if (!res.ok) throw new Error(await res.text());
    const txt = await res.text();
    return txt ? JSON.parse(txt) : null;
  }

  async function fetchTalents() {
    try {
      talents = await sbFetch('talents?order=created_at.asc') || [];
      renderTable();
      updateStatus(true, `Connected ✓ — ${talents.length} talent(s)`);
    } catch(e) { updateStatus(false, `Failed: ${e.message}`); }
  }

  function renderTable() {
    const tbody = document.getElementById('talentBody');
    if (!talents.length) { tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state">No talents yet. Click "Add Talent".</div></td></tr>'; return; }
    tbody.innerHTML = talents.map(t => `
      <tr>
        <td><div class="talent-photo-thumb">${t.photo_url ? `<img src="${t.photo_url}"/>` : '📷'}</div></td>
        <td><div class="talent-name-cell">${t.name_en}</div><div class="talent-cn">${t.name_zh||'—'}</div></td>
        <td>${t.based_in||'—'}</td><td>${t.languages||'—'}</td><td>${t.skills||'—'}</td>
        <td><span class="badge ${t.status==='active'?'badge-active':'badge-hidden'}">${t.status}</span>${t.featured?' <span class="badge badge-active">Featured</span>':''}</td>
        <td><button class="btn-edit" data-id="${t.id}">Edit</button><button class="btn-delete" data-id="${t.id}" data-name="${t.name_en}">Delete</button></td>
      </tr>`).join('');
  }

  document.getElementById('talentBody').addEventListener('click', e => {
    const eb = e.target.closest('.btn-edit');
    const db = e.target.closest('.btn-delete');
    if (eb) editTalent(eb.dataset.id);
    if (db) deleteTalent(db.dataset.id, db.dataset.name);
  });

  function openForm() {
    editingId = null;
    document.getElementById('formTitle').textContent = 'Add Talent';
    ['nameEn','nameZh','roleEn','roleZh','basedIn','languages','skills','photoUrl'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('photoPreview').style.display = 'none';
    document.getElementById('talentStatus').value = 'active';
    document.getElementById('talentFeatured').value = 'false';
    document.getElementById('talentForm').classList.add('active');
    setTimeout(() => document.getElementById('talentForm').scrollIntoView({behavior:'smooth'}), 50);
  }

  function editTalent(id) {
    const t = talents.find(t => t.id == id);
    if (!t) return;
    editingId = t.id;
    document.getElementById('formTitle').textContent = 'Edit Talent';
    document.getElementById('nameEn').value = t.name_en||'';
    document.getElementById('nameZh').value = t.name_zh||'';
    document.getElementById('roleEn').value = t.role_en||'';
    document.getElementById('roleZh').value = t.role_zh||'';
    document.getElementById('basedIn').value = t.based_in||'';
    document.getElementById('languages').value = t.languages||'';
    document.getElementById('skills').value = t.skills||'';
    document.getElementById('photoUrl').value = t.photo_url||'';
    document.getElementById('talentStatus').value = t.status||'active';
    document.getElementById('talentFeatured').value = t.featured?'true':'false';
    const prev = document.getElementById('photoPreview');
    prev.src = t.photo_url||''; prev.style.display = t.photo_url?'block':'none';
    document.getElementById('talentForm').classList.add('active');
    setTimeout(() => document.getElementById('talentForm').scrollIntoView({behavior:'smooth'}), 50);
  }

  function closeForm() {
    document.getElementById('talentForm').classList.remove('active');
    document.getElementById('photoPreview').style.display = 'none';
  }

  function previewPhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { const p = document.getElementById('photoPreview'); p.src = ev.target.result; p.style.display = 'block'; };
    reader.readAsDataURL(file);
  }

  async function saveTalent() {
    const talent = {
      name_en: document.getElementById('nameEn').value.trim(),
      name_zh: document.getElementById('nameZh').value.trim(),
      role_en: document.getElementById('roleEn').value.trim(),
      role_zh: document.getElementById('roleZh').value.trim(),
      based_in: document.getElementById('basedIn').value.trim(),
      languages: document.getElementById('languages').value.trim(),
      skills: document.getElementById('skills').value.trim(),
      photo_url: document.getElementById('photoUrl').value.trim(),
      status: document.getElementById('talentStatus').value,
      featured: document.getElementById('talentFeatured').value === 'true',
    };
    if (!talent.name_en) { showToast('Please enter a name', 'error'); return; }
    const fi = document.getElementById('photoFile');
    if (fi.files && fi.files[0]) {
      try { talent.photo_url = await uploadPhoto(fi.files[0], talent.name_en); }
      catch(e) { showToast('Photo failed: ' + e.message, 'error'); return; }
    }
    try {
      if (editingId) {
        await sbFetch(`talents?id=eq.${editingId}`, { method:'PATCH', body:JSON.stringify(talent) });
        showToast('Updated ✓', 'success');
      } else {
        await sbFetch('talents', { method:'POST', body:JSON.stringify(talent) });
        showToast('Added ✓', 'success');
      }
      closeForm(); fetchTalents();
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
  }

  async function deleteTalent(id, name) {
    if (!confirm(`Delete "${name}"?`)) return;
    try { await sbFetch(`talents?id=eq.${id}`, { method:'DELETE', prefer:'return=minimal' }); showToast('Deleted', 'success'); fetchTalents(); }
    catch(e) { showToast('Error: ' + e.message, 'error'); }
  }

  async function uploadPhoto(file, name) {
    const ext = file.name.split('.').pop();
    const filename = `${name.replace(/\s+/g,'-').toLowerCase()}-${Date.now()}.${ext}`;
    const res = await fetch(`${supabaseUrl}/storage/v1/object/talent-photos/${filename}`, {
      method:'POST', headers:{'apikey':supabaseKey,'Authorization':`Bearer ${supabaseKey}`,'Content-Type':file.type}, body:file
    });
    if (!res.ok) throw new Error(await res.text());
    return `${supabaseUrl}/storage/v1/object/public/talent-photos/${filename}`;
  }

  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.className = 'toast', 3000);
  }
</script>
</body>
</html>
